# monitoring/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ms-booking-manager
    static_configs:
      - targets:
          - ms-booking-manager:8081

  - job_name: ms-identity
    static_configs:
      - targets:
          - ms-identity:8082

  - job_name: ms-penalty-rank
    static_configs:
      - targets:
          - ms-penalty-rank:8083